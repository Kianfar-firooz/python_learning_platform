<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آکادمی چیز کد | آموزش لینوکس</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #0a0a0f;
            color: #f0f0f5; 
            font-family: 'Segoe UI', 'Tahoma', sans-serif; 
            padding: 2rem 1.5rem; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
        }
        
        /* پس‌زمینه با لوگو */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.2;
            z-index: 0;
        }
        
        /* لایه شیشه‌ای روی کل صفحه */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.4);
            backdrop-filter: blur(10px) saturate(1.3);
            -webkit-backdrop-filter: blur(10px) saturate(1.3);
            z-index: 0;
        }
        
        .hero-panel,
        .main-container,
        .modal-content {
            position: relative;
            z-index: 1;
        }
        
        .hero-panel { 
            width: 100%; 
            max-width: 1280px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; 
            padding: 1.2rem 2rem; 
            margin-bottom: 2rem; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            transition: all 0.3s ease;
        }
        
        .brand { display: flex; align-items: center; gap: 1rem; }
        
        .brand-logo { 
            font-size: 2.5rem; 
            cursor: pointer; 
            filter: drop-shadow(0 0 20px rgba(245, 184, 27, 0.3));
            transition: transform 0.3s ease;
        }
        .brand-logo:hover { transform: scale(1.1) rotate(-8deg); }
        
        .brand-text h1 { 
            font-size: 1.6rem; 
            background: linear-gradient(135deg, #f5b81b, #f7d875);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .brand-text p { 
            font-size: 0.85rem; 
            color: rgba(255, 255, 255, 0.4); 
        }
        
        .action-btn { 
            background: rgba(245, 184, 27, 0.1); 
            border: 1px solid rgba(245, 184, 27, 0.2); 
            padding: 0.7rem 1.6rem; 
            border-radius: 60px; 
            color: #f5b81b; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            font-size: 0.9rem; 
            transition: all 0.3s ease; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .action-btn:hover { 
            background: #f5b81b; 
            color: #0a0a0f; 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(245, 184, 27, 0.2);
        }
        
        .main-container { display: flex; width: 100%; max-width: 1280px; gap: 2rem; justify-content: center; }
        
        .sidebar { 
            width: 100%; 
            max-width: 500px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 32px; 
            padding: 2rem; 
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.03); 
            text-align: center; 
        }
        
        .sidebar-header { 
            font-size: 1.4rem; 
            color: #f5b81b; 
            margin-bottom: 1.5rem; 
            padding-bottom: 0.8rem; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(245, 184, 27, 0.1);
        }
        
        .lessons-list { display: flex; flex-direction: column; gap: 0.8rem; }
        
        .menu-item { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            padding: 1.1rem 1.4rem; 
            border-radius: 18px; 
            text-align: right; 
            color: rgba(255, 255, 255, 0.7); 
            font-size: 1.05rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            gap: 0.8rem; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .menu-item:hover { 
            background: rgba(245, 184, 27, 0.1); 
            border-color: rgba(245, 184, 27, 0.3); 
            color: #f5b81b; 
            transform: translateX(-6px) scale(1.02);
            box-shadow: 0 8px 30px rgba(245, 184, 27, 0.05);
        }
        
        /* استایل‌های باکس‌های درس */
        .code-block { 
            background: rgba(0, 0, 0, 0.5) !important; 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-right: 5px solid #f5b81b; 
            border-radius: 12px; 
            padding: 1.2rem; 
            font-family: 'Courier New', monospace; 
            font-size: 0.95rem; 
            color: #f0f0f5; 
            direction: ltr; 
            text-align: left; 
            margin: 1rem 0; 
            overflow-x: auto; 
        }
        .code-block-output { 
            background: rgba(0, 0, 0, 0.5) !important; 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-right: 5px solid #f5b81b; 
            border-radius: 12px; 
            padding: 1.2rem; 
            font-family: 'Courier New', monospace; 
            font-size: 0.95rem; 
            color: #ff0000; 
            direction: ltr; 
            text-align: left; 
            margin: 1rem 0; 
            overflow-x: auto; 
        }
        
        .exercise-box { 
            background: rgba(245, 184, 27, 0.04); 
            border: 1px dashed rgba(245, 184, 27, 0.2); 
            border-radius: 12px; 
            padding: 1rem; 
            margin: 1rem 0; 
            color: rgba(255, 255, 255, 0.8); 
        }
        
        .highlight-box { 
            background: rgba(80, 250, 123, 0.05); 
            border-right: 4px solid #50fa7b; 
            padding: 1rem; 
            margin-top: 1.5rem; 
            color: rgba(200, 255, 210, 0.9); 
            border-radius: 10px;
        }
        
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            overflow-y: auto; 
            padding: 2rem 1rem; 
        }
        
        .modal-content { 
            background: rgba(22, 22, 30, 0.85); 
            backdrop-filter: blur(40px) saturate(1.5);
            -webkit-backdrop-filter: blur(40px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            margin: 2rem auto; 
            padding: 2.5rem; 
            border-radius: 32px; 
            width: 95%; 
            max-width: 750px; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03); 
            border-top: 6px solid #f5b81b; 
            position: relative; 
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); 
        }
        
        @keyframes slideUp { 
            from { transform: translateY(50px) scale(0.96); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }
        
        .close-modal { 
            position: absolute; 
            left: 1.5rem; 
            top: 1.2rem; 
            font-size: 1.8rem; 
            font-weight: 300; 
            color: rgba(255, 255, 255, 0.4); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            background: rgba(255, 255, 255, 0.03);
            width: 44px;
            height: 44px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .close-modal:hover { 
            color: #ff6b6b; 
            transform: scale(1.1) rotate(90deg); 
            background: rgba(255, 80, 80, 0.1);
            border-color: rgba(255, 80, 80, 0.2);
        }
        
        #channelModal .modal-content {
            max-width: 450px;
            text-align: center;
            border-top-color: #f5b81b;
        }
        
        #channelModal .modal-content a {
            color: #f5b81b;
            text-decoration: none;
            font-weight: 500;
        }
        
        #channelModal .modal-content .channel-link {
            display: inline-block;
            background: rgba(245, 184, 27, 0.08);
            padding: 0.4rem 1.6rem;
            border-radius: 60px;
            border: 1px solid rgba(245, 184, 27, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        
        #channelModal .modal-content .channel-link:hover {
            background: rgba(245, 184, 27, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(245, 184, 27, 0.1);
        }
        
        @media (max-width: 700px) {
            body { padding: 1rem 0.8rem; }
            .hero-panel { flex-direction: column; align-items: flex-start; gap: 1rem; padding: 1.2rem 1.5rem; border-radius: 24px; }
            .brand-text h1 { font-size: 1.3rem; }
            .brand-logo { font-size: 2rem; }
            .sidebar { padding: 1.5rem 1rem; border-radius: 24px; }
            .modal-content { padding: 2rem 1.2rem; border-radius: 24px; }
            .menu-item { font-size: 0.95rem; padding: 0.9rem 1rem; }
            .close-modal { left: 0.8rem; top: 0.8rem; width: 38px; height: 38px; font-size: 1.5rem; }
        }
        
        @media (max-width: 450px) {
            .action-btn { font-size: 0.75rem; padding: 0.4rem 1rem; }
            .brand-logo { font-size: 1.8rem; }
        }
    </style>
    <script src="linux-config.js"></script>
</head>
<body>

    <header class="hero-panel">
        <div class="brand">
            <div class="brand-logo" id="logoBtn">🧀</div>
            <div class="brand-text"><h1>آکادمی چیز کد</h1><p>CheeseCode Academy</p></div>
        </div>
        <button class="action-btn" id="infoButton">📢 اطلاعات کانال</button>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h2 class="sidebar-header">📚 جهت شروع، روی درس کلیک کنید</h2>
            <nav class="lessons-list" id="lessons-menu"></nav>
        </aside>
    </div>

    <div id="lessonModal" class="modal">
        <div class="modal-content"><span class="close-modal" id="closeLesson">&times;</span><div id="modal-body-content"></div></div>
    </div>

    <div id="channelModal" class="modal">
        <div class="modal-content" style="max-width: 450px; text-align: center; border-top-color: #f5b81b;">
            <span class="close-modal" id="closeChannel">&times;</span>
            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🎓</div>
            <h3 style="color: #f5b81b; font-weight: 700; font-size: 1.4rem;">آکادمی چیزکد | CheeseCode</h3>
            <p style="margin: 1rem 0; color: rgba(255,255,255,0.5);">🍕 آموزش ساده پایتون مثل خوردن پنیر</p>
            <p style="color: rgba(255,255,255,0.7);">
                ارتباط با ادمین: 
                <span style="background: rgba(245, 184, 27, 0.08); color: #f5b81b; padding: 0.3rem 1rem; border-radius: 60px; border: 1px solid rgba(245, 184, 27, 0.1); display: inline-block; backdrop-filter: blur(4px);">
                    @cheese_code
                </span>
            </p>
            <p style="margin-top: 1.5rem;">
                <a href="https://ble.ir/cheesecode" target="_blank" class="channel-link" style="color: #f5b81b; text-decoration: none; font-size: 0.95rem; font-weight: 600; display: inline-block; background: rgba(245, 184, 27, 0.08); padding: 0.5rem 1.8rem; border-radius: 60px; border: 1px solid rgba(245, 184, 27, 0.1); transition: all 0.3s ease; backdrop-filter: blur(8px);" 
                   onmouseover="this.style.background='rgba(245, 184, 27, 0.2)'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 40px rgba(245, 184, 27, 0.1)';"
                   onmouseout="this.style.background='rgba(245, 184, 27, 0.08)'; this.style.transform='scale(1)'; this.style.boxShadow='none';">
                    👈 ورود به کانال بله 👉
                </a>
            </p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var menuContainer = document.getElementById('lessons-menu');
            var lessonModal = document.getElementById('lessonModal');
            var modalBody = document.getElementById('modal-body-content');
            var closeLesson = document.getElementById('closeLesson');
            var channelModal = document.getElementById('channelModal');
            var logoBtn = document.getElementById('logoBtn');
            var infoButton = document.getElementById('infoButton');
            var closeChannel = document.getElementById('closeChannel');

            if (typeof lessonsConfig === 'undefined') { 
                menuContainer.innerHTML = '<p style="color: #ff6b6b; padding: 1rem;">خطا: فایل linux-config.js یافت نشد!</p>';
                return; 
            }
            menuContainer.innerHTML = '';

            for (var i = 0; i < lessonsConfig.length; i++) {
                (function(index) {
                    var lesson = lessonsConfig[index];
                    var button = document.createElement('button');
                    button.className = 'menu-item';
                    button.innerHTML = '<span>🧀</span> ' + (index + 1) + '. ' + lesson.title;
                    
                    button.addEventListener('click', function() {
                        fetch('linux-lessons/' + lesson.file)
                            .then(function(res) { return res.text(); })
                            .then(function(html) {
                                modalBody.innerHTML = html;
                                lessonModal.style.display = 'block';
                                document.body.style.overflow = 'hidden';
                            })
                            .catch(function() {
                                modalBody.innerHTML = '<div style="text-align:center; padding:2rem;"><div style="font-size:3rem;">🧀</div><h3 style="color:#f5b81b;">خطا در بارگذاری فایل درس</h3><p style="color:rgba(255,255,255,0.4);">فایل مورد نظر پیدا نشد</p></div>';
                                lessonModal.style.display = 'block';
                            });
                    });
                    menuContainer.appendChild(button);
                })(i);
            }

            closeLesson.addEventListener('click', function() { lessonModal.style.display = 'none'; document.body.style.overflow = 'auto'; });
            infoButton.addEventListener('click', function() { channelModal.style.display = 'block'; });
            logoBtn.addEventListener('click', function() { channelModal.style.display = 'block'; });
            closeChannel.addEventListener('click', function() { channelModal.style.display = 'none'; });
            window.addEventListener('click', function(e) { if (e.target === lessonModal) { lessonModal.style.display = 'none'; document.body.style.overflow = 'auto'; } if (e.target === channelModal) { channelModal.style.display = 'none'; } });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (lessonModal.style.display === 'block') {
                        lessonModal.style.display = 'none';
                        document.body.style.overflow = 'auto';
                    }
                    if (channelModal.style.display === 'block') {
                        channelModal.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
